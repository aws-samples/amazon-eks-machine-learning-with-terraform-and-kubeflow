# BYO Agent - Default Values
#
# Required fields:
#   name        - Agent name (must end in "-agent")
#   description - Agent description (shown in kagent UI)
#   image.repository - Container image URI (without tag)

# Agent identity
name: ""
namespace: kagent
description: ""

# Container image
image:
  repository: ""
  tag: "0.1.1"

# Environment variables passed to the agent container
env:
  - name: AWS_REGION
    value: "us-west-2"

# Resource requests and limits
resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "1Gi"
    cpu: "500m"

# ServiceAccount for IRSA:
# The kagent controller creates a ServiceAccount for each agent automatically.
# Annotate it post-deploy with the IRSA role (see build-and-deploy.sh).

# Optional in-cluster Redis (for development/workshop use)
redis:
  enabled: false
  image: redis:7-alpine
