---
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: cudaefa
  namespace: {{ .Values.namespace }}
spec:
  amiFamily: AL2023
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery/cudaefa: "{{ .Values.cluster_id }}"
  securityGroupSelectorTerms:
    - tags:
        "kubernetes.io/cluster/{{ .Values.cluster_id }}": "owned"

  {{- if and .Values.cr.enabled (or (gt (len .Values.cr.cudaefa.ids) 0) (gt (len .Values.cr.cudaefa.tags) 0)) }}
  capacityReservationSelectorTerms:
    {{- range .Values.cr.cudaefa.ids }}
    - id: {{ . }}
    {{- end }}
    {{- if gt (len .Values.cr.cudaefa.tags) 0 }}
    - tags:
        {{- range $key, $value := .Values.cr.cudaefa.tags }}
        {{ $key }}: {{ $value | quote }}
        {{- end }}
    {{- end }}
  {{- end }}

  amiSelectorTerms:
    # NOTE: 'cudaefa' EC2NodeClass — used by the 'cudaefa' NodePool for NVIDIA GPU +
    # EFA workloads. Same alias-staleness issue as the 'default' class above. NVIDIA
    # variant AMIs live under a different SSM path; when repinning, verify at:
    #   /aws/service/eks/optimized-ami/<k8s>/amazon-linux-2023/x86_64/nvidia/
    - alias: al2023@latest

  role: "{{ .Values.role_name }}"

  tags:
    name: {{ .Values.cluster_id }}-karpenter

  metadataOptions:
    httpEndpoint: enabled
    httpProtocolIPv6: disabled
    httpPutResponseHopLimit: 2
    httpTokens: required

