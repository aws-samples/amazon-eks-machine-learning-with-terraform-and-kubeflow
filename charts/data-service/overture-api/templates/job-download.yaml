---
# Job: {{ .Release.Name }}-download
#
# Downloads the Overture transportation parquet partition from S3 to FSx.
# Runs as a post-install hook before the init (filter) job.
#
# Idempotent: skips download if the raw parquet directory already contains
# files (allows helm upgrade to re-run install without redownloading 5GB).
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-download
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "overture-api.labels" . | nindent 4 }}
    app.kubernetes.io/component: download-job
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 0
  activeDeadlineSeconds: {{ .Values.jobTimeouts.downloadSeconds }}
  template:
    metadata:
      labels:
        {{- include "overture-api.labels" . | nindent 8 }}
        app.kubernetes.io/component: download-job
      annotations:
        sidecar.istio.io/inject: "false"
        karpenter.sh/do-not-disrupt: "true"
    spec:
      nodeSelector:
        karpenter.sh/nodepool: cpu-compute
      tolerations:
      - key: compute-tier
        operator: Equal
        value: heavy-cpu
        effect: NoSchedule
      restartPolicy: Never
      volumes:
        - name: fsx
          persistentVolumeClaim:
            claimName: {{ .Values.pvc.fsx }}
      containers:
        - name: download
          image: amazon/aws-cli:2.17.0
          imagePullPolicy: IfNotPresent
          resources:
            {{- toYaml .Values.resources.download | nindent 12 }}
          volumeMounts:
            - name: fsx
              mountPath: {{ .Values.fsx.mountPath }}
          command:
            - sh
            - -c
            - |
              set -e

              S3_SOURCE="{{ include "overture-api.s3SourcePath" . }}"
              RAW_DIR="{{ include "overture-api.rawDir" . }}"

              echo "============================================"
              echo "Overture API — Parquet Download Job"
              echo "Release : {{ .Release.Name }}"
              echo "Release tag: {{ .Values.overture.release }}"
              echo "Theme   : {{ .Values.overture.theme }}/{{ .Values.overture.type }}"
              echo "S3 src  : ${S3_SOURCE}"
              echo "Target  : ${RAW_DIR}"
              echo "============================================"

              # Idempotency check — skip if files already present.
              if [ -d "${RAW_DIR}" ] && [ -n "$(ls -A ${RAW_DIR}/*.parquet 2>/dev/null)" ]; then
                echo "Raw parquet shards already present in ${RAW_DIR}"
                echo "Total size: $(du -sh ${RAW_DIR} | cut -f1)"
                echo "Skipping download."
                exit 0
              fi

              mkdir -p "${RAW_DIR}"

              echo "Starting download via AWS CLI (--no-sign-request, anonymous)..."
              aws s3 cp "${S3_SOURCE}/" "${RAW_DIR}/" \
                --recursive \
                --no-sign-request \
                --only-show-errors

              echo ""
              echo "Download complete."
              echo "Files: $(ls ${RAW_DIR} | wc -l)"
              echo "Size : $(du -sh ${RAW_DIR} | cut -f1)"
