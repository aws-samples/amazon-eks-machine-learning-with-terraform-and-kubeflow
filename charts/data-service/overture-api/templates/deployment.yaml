---
# Deployment: {{ .Release.Name }}
#
# Serves typed REST queries (/api/segments/{id}, /api/neighbors/{connector_id},
# /api/segments?bbox=...&limit=N, /api/status) backed by the filtered parquet
# on FSx via an in-process DuckDB connection.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "overture-api.labels" . | nindent 4 }}
    app.kubernetes.io/component: overture-server
  annotations:
    overture-api/release: {{ .Values.overture.release | quote }}
    overture-api/bbox: {{ include "overture-api.bboxString" . | quote }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "overture-api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "overture-api.labels" . | nindent 8 }}
        app.kubernetes.io/component: overture-server
      annotations:
        karpenter.sh/do-not-disrupt: "true"
        sidecar.istio.io/inject: 'false'
    spec:
      nodeSelector:
        karpenter.sh/nodepool: cpu-compute
      tolerations:
      - key: compute-tier
        operator: Equal
        value: heavy-cpu
        effect: NoSchedule
      volumes:
        - name: fsx
          persistentVolumeClaim:
            claimName: {{ .Values.pvc.fsx }}

      initContainers:
        # Wait for the filtered parquet to be written by the init job.
        - name: wait-for-filtered
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          volumeMounts:
            - name: fsx
              mountPath: {{ .Values.fsx.mountPath }}
          command:
            - sh
            - -c
            - |
              FILTERED="{{ include "overture-api.filteredPath" . }}"
              echo "Waiting for filtered parquet at ${FILTERED}..."
              while [ ! -f "${FILTERED}" ]; do
                echo "  Not yet — retrying in 15s"
                sleep 15
              done
              echo "Filtered parquet ready: $(du -sh ${FILTERED} | cut -f1)"

      containers:
        - name: overture
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            - name: FILTERED_PATH
              value: "{{ include "overture-api.filteredPath" . }}"
            - name: OVERTURE_RELEASE_TAG
              value: {{ .Values.overture.release | quote }}
            - name: OVERTURE_BBOX
              value: {{ include "overture-api.bboxString" . | quote }}
            - name: UVICORN_PORT
              value: "80"
            - name: UVICORN_HOST
              value: "0.0.0.0"
          readinessProbe:
            httpGet:
              path: /api/status
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          livenessProbe:
            httpGet:
              path: /api/status
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          resources:
            {{- toYaml .Values.resources.serve | nindent 12 }}
          volumeMounts:
            - name: fsx
              mountPath: {{ .Values.fsx.mountPath }}
              readOnly: true
