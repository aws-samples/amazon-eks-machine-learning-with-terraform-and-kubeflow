apiVersion: v2
name: overture-api
description: >
  Deploys a self-contained Overture Maps API instance backed by a
  bbox-filtered snapshot of a transportation theme release. At install
  time, a Job reads the Overture partition directly from S3 via DuckDB's
  httpfs extension (parquet predicate pushdown ⇒ only relevant row groups
  are fetched, ~50 MB not 66 GB), filters to the configured bounding box,
  and writes the result to a persistent FSx volume. A companion Deployment
  exposes a typed REST API (segments / neighbors / bbox / status) over
  the filtered snapshot for in-cluster agent queries.

  Designed for use with AWS EKS clusters where:
    - An FSx for Lustre PVC is pre-bound in the target namespace
    - Istio sidecar injection is active in the namespace
    - Outbound HTTPS access is available from pods (Istio sidecar disabled)

  Install multiple releases with different bounding boxes / release tags
  to host multiple Overture instances side by side.

type: application
version: 0.1.0
appVersion: "2026.06.17"
keywords:
  - overture
  - openstreetmap
  - geospatial
  - data-service
  - parquet
maintainers:
