---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-init
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "overpass-api.labels" . | nindent 4 }}
    app.kubernetes.io/component: init-job
  annotations:
    # Hook ordering: init (weight 1) runs after download (weight 0).
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 0
  activeDeadlineSeconds: {{ .Values.jobTimeouts.initSeconds }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: init-job
      annotations:
        sidecar.istio.io/inject: "false"
        karpenter.sh/do-not-disrupt: "true"
    spec:
      nodeSelector:
        # Tells the pod to only schedule on this specific Karpenter NodePool
        karpenter.sh/nodepool: cpu-compute

      tolerations:
      # Allows the pod to bypass the taint
      - key: compute-tier
        operator: Equal
        value: heavy-cpu
        effect: NoSchedule
        
      restartPolicy: Never
      volumes:
        - name: fsx
          persistentVolumeClaim:
            claimName: {{ .Values.pvc.fsx }}

        - name: efs
          persistentVolumeClaim:
            claimName: {{ .Values.pvc.efs }}

        - name: ebs
          ephemeral:
            volumeClaimTemplate:
              spec:
                accessModes:
                  - ReadWriteOnce
                resources:
                  requests:
                    storage: {{ .Values.ebs.storage }}
                storageClassName: ebs-sc-wait

      initContainers:
        # Wait for the PBF file to appear on FSx before starting init.
        # Guards against the init job being scheduled before the download
        # job completes (e.g. on helm upgrade with a slow download).
        - name: wait-for-pbf
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          volumeMounts:
            - name: fsx
              mountPath: {{ .Values.fsx.mountPath }}
          command:
            - sh
            - -c
            - |
              PBF_FILE="{{ include "overpass-api.pbfPath" . }}"
              TIMEOUT={{ .Values.jobTimeouts.pbfWaitSeconds }}
              ELAPSED=0
              echo "Waiting for PBF at: ${PBF_FILE}"
              until [ -f "${PBF_FILE}" ]; do
                if [ "${ELAPSED}" -ge "${TIMEOUT}" ]; then
                  echo "ERROR: Timed out after ${TIMEOUT}s waiting for ${PBF_FILE}"
                  echo "Check that the download job completed successfully:"
                  echo "  kubectl logs -n {{ .Values.namespace }} job/{{ .Release.Name }}-download"
                  exit 1
                fi
                echo "  Not found — waited ${ELAPSED}s / ${TIMEOUT}s"
                sleep 10
                ELAPSED=$((ELAPSED + 10))
              done
              echo "PBF found: $(du -sh ${PBF_FILE} | cut -f1)"

      containers:
        - name: overpass-init
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          resources:
            {{- toYaml .Values.resources.init | nindent 12 }}
          volumeMounts:
            - name: efs
              mountPath: {{ .Values.efs.mountPath }}
            - name: fsx
              mountPath: {{ .Values.fsx.mountPath }}
            - name: ebs
              mountPath: {{ .Values.ebs.mountPath }}
          env:
            - name: OVERPASS_META
              value: {{ .Values.overpass.meta | quote }}
            - name: OVERPASS_COMPRESSION
              value: {{ .Values.overpass.compression | quote }}
            - name: OVERPASS_RULES_LOAD
              value: {{ .Values.overpass.rulesLoad | quote }}
          command:
            - sh
            - -c
            - |
              set -e

              STATUS_FILE="{{ .Values.efs.mountPath }}/{{ .Values.efs.dbDir }}/{{ .Release.Name }}/.init-status"
              STATUS=$(cat "${STATUS_FILE}" 2>/dev/null || echo "PENDING")

              echo "============================================"
              echo "Overpass API — Database Init Job"
              echo "Release     : {{ .Release.Name }}"
              echo "DB path     : /db/db/"
              echo "PBF file    : {{ include "overpass-api.pbfPath" . }}"
              echo "Meta        : {{ .Values.overpass.meta }}"
              echo "Compression : {{ .Values.overpass.compression }}"
              echo "Status      : ${STATUS}"
              echo "============================================"

              if [ "${STATUS}" = "ALREADY_INITIALIZED" ]; then
                echo "Database already initialized. Skipping."
                echo "To force re-initialization, delete ${STATUS_FILE} and run helm upgrade."
                exit 0
              fi

              mkdir -p /db/db

              echo "Starting Overpass database initialization..."
              echo "PBF size: $(du -sh {{ include "overpass-api.pbfPath" . }} | cut -f1)"
              echo ""

              osmium cat \
                --input-format pbf \
                --output-format osm \
                -o - \
                {{ include "overpass-api.pbfPath" . }} | \
              /app/bin/update_database \
                --db-dir=/db/db \
                --meta={{ .Values.overpass.meta }} \
                --compression-method={{ .Values.overpass.compression }} \
                --map-compression-method={{ .Values.overpass.compression }}

              echo "Compressing and copying database to EFS..."
              mkdir -p /efs/{{ .Values.efs.dbDir }}/{{ .Release.Name }}
              tar -czf /efs/{{ .Values.efs.dbDir }}/{{ .Release.Name }}/db.tar.gz -C /db/db .
              echo "Archive complete: $(du -sh /efs/{{ .Values.efs.dbDir }}/{{ .Release.Name }}/db.tar.gz | cut -f1)"
              echo "ALREADY_INITIALIZED" > /efs/{{ .Values.efs.dbDir }}/{{ .Release.Name }}/.init-status
              echo "Initialization complete."
