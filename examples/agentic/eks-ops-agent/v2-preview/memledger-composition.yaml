# Memledger composition config — RESERVED FOR v2 (AWS SDK integration).
#
# Not consumed by v1. v1 ships pgvector-only. This file documents the planned
# v2 backend topology so the chart values, IAM, and env wiring are ready when
# DynamoDB + OpenSearch support lands in memledger v2.
#
# To activate in v2: bake this into the image at /app/memledger-composition.yaml,
# set MEMLEDGER_CONFIG_PATH=/app/memledger-composition.yaml, install the
# memledger[dynamodb,opensearch] extras, and provision via
# v2-preview/setup-engram-composition.sh.
#
# Backend topology (v2):
#   DynamoDB (memledger-memory) → primary store, sub-ms key-value reads
#   OpenSearch (memledger-dev)  → search index, BM25 + vector hybrid via RRF
#
# IAM (v2 — attach to the agent's IRSA role):
#   - DynamoDB CRUD on table arn:aws:dynamodb:<region>:<acct>:table/memledger-memory
#   - OpenSearch es:ESHttp* on arn:aws:es:<region>:<acct>:domain/memledger-dev/*

version: "1.0"

embeddings:
  provider: bedrock
  model: amazon.titan-embed-text-v2:0
  dimensions: 1024

conflict_threshold: 0.65
auto_promote_threshold: 3

default_backend: composition

backends:
  composition:
    provider: composition
    config:
      primary: dynamodb
      search: opensearch
      sync: inline

  dynamodb:
    provider: dynamodb
    config:
      table_name: ${MEMLEDGER_DDB_TABLE:memledger-memory}
      region: ${AWS_REGION:us-west-2}
      create_table: true

  opensearch:
    provider: opensearch
    config:
      hosts:
        - https://${OPENSEARCH_ENDPOINT}
      index_name: ${MEMLEDGER_OS_INDEX:memledger-memory}
      auth_type: aws_sigv4
      region: ${AWS_REGION:us-west-2}
      verify_certs: true
      dimensions: 1024
