# Engram composition config for the EKS Ops Agent on kagent.
#
# Baked into the container image at /app/engram-composition.yaml.
# Activated by setting ENGRAM_CONFIG_PATH=/app/engram-composition.yaml.
# OpenSearch endpoint and DynamoDB table name are pulled from env vars at
# load time (engram supports ${VAR} interpolation in config files).
#
# Backend topology:
#   DynamoDB (engram-memory)  → primary store, sub-ms key-value reads
#   OpenSearch (engram-dev)   → search index, BM25 + vector hybrid via RRF
#
# IAM (attached to kagent-on-eks-kagent-bedrock-role):
#   - DynamoDB CRUD on table arn:aws:dynamodb:us-west-2:489829964455:table/engram-memory
#   - OpenSearch es:ESHttp* on arn:aws:es:us-west-2:489829964455:domain/engram-dev/*

version: "1.0"

embeddings:
  provider: bedrock
  model: amazon.titan-embed-text-v2:0
  dimensions: 1024

conflict_threshold: 0.65
auto_promote_threshold: 3

default_backend: composition

backends:
  composition:
    provider: composition
    config:
      primary: dynamodb
      search: opensearch
      sync: inline

  dynamodb:
    provider: dynamodb
    config:
      table_name: ${ENGRAM_DDB_TABLE:engram-memory}
      region: ${AWS_REGION:us-west-2}
      create_table: true

  opensearch:
    provider: opensearch
    config:
      hosts:
        - https://${OPENSEARCH_ENDPOINT}
      index_name: ${ENGRAM_OS_INDEX:engram-memory}
      auth_type: aws_sigv4
      region: ${AWS_REGION:us-west-2}
      verify_certs: true
      dimensions: 1024
