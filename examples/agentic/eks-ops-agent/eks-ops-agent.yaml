# EKS Ops Agent - Helm values for charts/machine-learning/agentic/kagent-agent
#
# Usage:
#   helm install eks-ops-agent \
#     charts/machine-learning/agentic/kagent-agent \
#     -f examples/agentic/eks-ops-agent/eks-ops-agent.yaml \
#     --set image.repository=<ECR_REPO>

name: eks-ops-agent
namespace: kagent
description: "EKS Operations Agent - manages and troubleshoots Amazon EKS clusters"

image:
  repository: ""  # Set via --set (e.g. 123456789012.dkr.ecr.us-west-2.amazonaws.com/eks-ops-agent)
  tag: "0.1.3"

env:
  - name: AWS_REGION
    value: "us-west-2"
  - name: BEDROCK_MODEL_ID
    value: "us.anthropic.claude-sonnet-4-20250514-v1:0"
  # Module 2: Set to "true" to enable EKS MCP Server tools
  - name: ENABLE_MCP_TOOLS
    value: "false"
  # Module 3: Set to "true" to enable engram memory
  - name: ENABLE_MEMORY
    value: "false"
  # Engram connection — uses kagent's Aurora PostgreSQL+pgvector
  # Set via build-and-deploy.sh from kagent-db-credentials secret
  - name: ENGRAM_PG_URL
    value: ""

  # Engram composition mode (DynamoDB primary + OpenSearch search index).
  # Uncomment ENGRAM_CONFIG_PATH and OPENSEARCH_ENDPOINT to enable.
  # When ENGRAM_CONFIG_PATH is set, ENGRAM_PG_URL is ignored.
  # - name: ENGRAM_CONFIG_PATH
  #   value: "/app/engram-composition.yaml"
  # - name: OPENSEARCH_ENDPOINT
  #   value: "search-engram-dev-yq2c52v6qzuivfn4qlrdxxwssm.us-west-2.es.amazonaws.com"
  # - name: ENGRAM_DDB_TABLE
  #   value: "engram-memory"

resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "1Gi"
    cpu: "500m"

# IRSA: build-and-deploy.sh annotates the controller-created ServiceAccount
# with the Bedrock IAM role post-deploy, then restarts the deployment.
