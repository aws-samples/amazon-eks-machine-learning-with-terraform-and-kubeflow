# EKS Ops Agent - Helm values for charts/machine-learning/agentic/kagent-agent
#
# Usage:
#   helm install eks-ops-agent \
#     charts/machine-learning/agentic/kagent-agent \
#     -f examples/agentic/eks-ops-agent/eks-ops-agent.yaml \
#     --set image.repository=<ECR_REPO>

name: eks-ops-agent
namespace: kagent
description: "EKS Operations Agent - manages and troubleshoots Amazon EKS clusters"

image:
  repository: ""  # Set via --set (e.g. 123456789012.dkr.ecr.us-west-2.amazonaws.com/eks-ops-agent)
  tag: "0.1.1"

env:
  - name: AWS_REGION
    value: "us-west-2"
  - name: BEDROCK_MODEL_ID
    value: "us.anthropic.claude-sonnet-4-20250514-v1:0"
  # Module 2: Set to "true" to enable EKS MCP Server tools
  - name: ENABLE_MCP_TOOLS
    value: "false"
  # Module 3: Set to "true" to enable Redis memory for user defaults
  - name: ENABLE_MEMORY
    value: "false"
  - name: REDIS_URL
    value: "redis://redis.kagent.svc.cluster.local:6379"

resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "1Gi"
    cpu: "500m"

# IRSA: build-and-deploy.sh annotates the controller-created ServiceAccount
# with the Bedrock IAM role post-deploy, then restarts the deployment.
