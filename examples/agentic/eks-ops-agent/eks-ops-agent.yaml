# EKS Ops Agent - Helm values for charts/machine-learning/agentic/kagent-agent
#
# Usage:
#   helm install eks-ops-agent \
#     charts/machine-learning/agentic/kagent-agent \
#     -f examples/agentic/eks-ops-agent/eks-ops-agent.yaml \
#     --set image.repository=<ECR_REPO>

name: eks-ops-agent
namespace: kagent
description: "EKS Operations Agent - manages and troubleshoots Amazon EKS clusters"

image:
  repository: ""  # Set via --set (e.g. 123456789012.dkr.ecr.us-west-2.amazonaws.com/eks-ops-agent)
  tag: "0.1.3"

env:
  # AWS_REGION resolves via the SDK chain (memledger v2): explicit value >
  # $AWS_REGION > $AWS_DEFAULT_REGION > ~/.aws/config. Set here to pin it.
  - name: AWS_REGION
    value: "us-west-2"
  - name: BEDROCK_MODEL_ID
    value: "us.anthropic.claude-sonnet-4-20250514-v1:0"
  # Module 2: Set to "true" to enable EKS MCP Server tools
  - name: ENABLE_MCP_TOOLS
    value: "false"
  # Module 3 — memory. Two implementations live side by side:
  #   * Redis (existing baseline) — set ENABLE_MEMORY=true and the agent
  #     uses the in-cluster Redis service for user defaults. Redis is the
  #     default and remains undisturbed.
  #   * memledger v1 or v2 (opt-in addon) — set ENABLE_MEMLEDGER=true
  #     plus MEMLEDGER_PG_DSN (and MEMLEDGER_CONFIG_PATH for v2). See the
  #     agentic README for both tracks.
  - name: ENABLE_MEMORY
    value: "false"
  - name: ENABLE_MEMLEDGER
    value: "false"
  # memledger v2.0 ships three single-backend choices (one at a time):
  #   1. Postgres + pgvector (OSS, in-cluster) — default below.
  #   2. Aurora + pgvector with IAM auth — same config path; flip
  #      MEMLEDGER_PG_IAM_AUTH=true and point MEMLEDGER_PG_DSN at Aurora
  #      (no password in the DSN).
  #   3. OpenSearch with SigV4 — uncomment OPENSEARCH_ENDPOINT below.
  # DynamoDB + multi-backend composition land in v2.1 — see v2-preview/.
  - name: MEMLEDGER_CONFIG_PATH
    value: "/app/memledger-composition.yaml"
  # Postgres / Aurora DSN — required for backends 1 and 2. Populated by
  # build-and-deploy.sh from the kagent-db-credentials secret.
  - name: MEMLEDGER_PG_DSN
    value: ""
  # OpenSearch backend (option 3). Uncomment + set the domain endpoint
  # to switch the agent to OpenSearch SigV4. Requires the OpenSearch IAM
  # statement on the agent's IRSA role — see v2-preview/memledger-composition-policy.json
  # for the policy template.
  # - name: OPENSEARCH_ENDPOINT
  #   value: "search-memledger-dev-xxxxx.us-west-2.es.amazonaws.com"

resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "1Gi"
    cpu: "500m"

# IRSA: build-and-deploy.sh annotates the controller-created ServiceAccount
# with the Bedrock IAM role post-deploy, then restarts the deployment.
